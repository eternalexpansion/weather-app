<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <h3 id="geo-msg" class="msg" style="font-size: 1.2rem; margin-top: 10px;"></h3>
</head>
<body>
<section class="top-banner">
  <div class="container">
    <h1 class="heading">Simple Weather App</h1>
    <form>
      <input type="text" placeholder="Search for a city" autofocus>
      <button type="submit">SUBMIT</button>
      <span class="msg"></span>
      <button type="button" id="clear-btn" style="margin-left: 10px; background: #ff8c00;">Clear</button>
      <button type="button" id="geo-btn" style="margin-left: 10px; background: #53627c;">My city</button>
    </form>
  </div>
</section>
<section class="ajax-section">
  <div class="container">
    <ul class="cities"></ul>
  </div>
</section>
<footer class="page-footer">
  <div class="container">
    <small>Made with <span>❤</span> by <a href="http://georgemartsoukos.com/" target="_blank">George Martsoukos</a>
        <small>Updated by <a href="https://github.com/eternalexpansion" target="_blank">Eternalexpansion</a>
    </small>
  </div>
</footer>    
</body>
